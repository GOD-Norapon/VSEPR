<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>บรรลุ VSEPR แบบ Pro Max</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.8);
            --charcoal: #292F36;
            --deep-red: #A41F13;
        }

        body { 
            margin: 0; 
            font-family: 'Prompt', sans-serif; 
            overflow: hidden; 
            background: #ffffff;
            touch-action: none;
        }

        /* --- UI แผงควบคุม (Liquid Glass) --- */
        #ui {
            position: absolute; 
            top: 20px; 
            left: 20px; 
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 20px; 
            border-radius: 24px; 
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            width: 280px; 
            z-index: 100; 
            max-height: 85vh; 
            overflow-y: auto;
            transition: transform 0.4s ease;
        }

        @media (max-width: 600px) {
            #ui { width: calc(100% - 40px); top: auto; bottom: 20px; left: 20px; max-height: 45vh; padding: 15px; }
            #ui.hidden { transform: translateY(calc(100% + 40px)); }
            #mobile-toggle { display: block !important; }
        }

        #mobile-toggle {
            display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 110; background: var(--charcoal); color: white; border: none; padding: 10px 20px;
            border-radius: 30px; font-family: 'Prompt'; font-weight: 600; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        h2 { margin: 0 0 15px; color: var(--charcoal); text-align: center; font-size: 18px; font-weight: 600; }
        .group { background: rgba(255, 255, 255, 0.5); padding: 12px; border-radius: 16px; margin-bottom: 10px; border: 1px solid rgba(255, 255, 255, 0.9); }
        label { font-size: 12px; font-weight: 600; display: block; margin-bottom: 8px; color: #333; }
        .val-display { float: right; color: var(--deep-red); font-weight: bold; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--charcoal); }
        button { width: 100%; padding: 10px; border-radius: 12px; border: none; background: var(--charcoal); color: white; font-family: 'Prompt'; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 5px; font-size: 12px;}
        
        #status { text-align: center; padding: 12px; border-radius: 12px; font-weight: 600; margin-top: 15px; font-size: 14px; }

        #credit {
            position: fixed; bottom: 20px; right: 20px; background: var(--glass); backdrop-filter: blur(10px);
            padding: 10px 18px; border-radius: 15px; border: 1px solid var(--glass-border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); color: var(--charcoal); font-weight: 600; font-size: 13px;
            display: flex; align-items: center; gap: 8px; z-index: 90;
        }

        .atom-label {
            position: absolute; background: rgba(255,255,255,0.9); padding: 2px 8px; border-radius: 8px;
            font-size: 10px; font-weight: bold; pointer-events: none; transform: translate(-50%, -50%);
            z-index: 50; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        #instruction-hint {
            position: fixed; top: 20px; right: 20px; font-size: 11px; color: #888; text-align: right; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="instruction-hint">
    คลิกซ้าย: หมุน | คลิกขวา: ย้ายตำแหน่ง<br>Scroll: ซูม
</div>

<button id="mobile-toggle" onclick="toggleUI()">ซ่อน/แสดงเมนู</button>

<div id="ui">
    <h2>บรรลุ VSEPR แบบ Pro Max</h2>
    
    <div class="group">
        <label>รูปทรงโมเลกุล (VSEPR)</label>
        <select id="shape" style="width:100%; padding:8px; border-radius:10px; border:1px solid #ddd; font-family:'Prompt';" onchange="initUI()">
            <optgroup label="รูปทรงสมมาตร">
                <option value="AX2">AX2 - เส้นตรง</option>
                <option value="AX3">AX3 - สามเหลี่ยมแบนราบ</option>
                <option value="AX4">AX4 - ทรงสี่หน้า</option>
                <option value="AX5">AX5 - พีระมิดคู่ฐานสามเหลี่ยม</option>
                <option value="AX6">AX6 - ทรงแปดหน้า</option>
            </optgroup>
            <optgroup label="รูปทรงไม่สมมาตร (E)">
                <option value="AX2E">AX2E - มุมงอ</option>
                <option value="AX3E">AX3E - พีระมิดฐานสามเหลี่ยม</option>
                <option value="AX2E2">AX2E2 - มุมงอ (V-Shape)</option>
                <option value="AX4E">AX4E - See-saw</option>
                <option value="AX3E2">AX3E2 - รูปตัว T</option>
                <option value="AX5E">AX5E - พีระมิดฐานสี่เหลี่ยม</option>
                <option value="AX4E2">AX4E2 - สี่เหลี่ยมแบนราบ</option>
            </optgroup>
        </select>
    </div>

    <div class="group">
        <label>ระยะห่างพันธะ <span id="bondL_val" class="val-display">2.0</span></label>
        <input type="range" id="bondL" min="1.0" max="4.0" step="0.1" value="2.0" oninput="update()">
        <button onclick="resetRotation()">คืนค่ามุมมอง</button>
        <button onclick="resetPosition()" style="background:#555;">รีเซ็ตตำแหน่ง</button>
    </div>

    <div class="group">
        <label>ค่า EN อะตอมกลาง <span id="enC_val" class="val-display">2.5</span></label>
        <input type="range" id="enC" min="0.7" max="4.0" step="0.1" value="2.5" oninput="update()">
        <button style="background:var(--deep-red);" onclick="resetEN()">รีเซ็ตค่า EN</button>
    </div>

    <div id="outer_controls"></div>
    <div id="status">Ready</div>
</div>

<div id="labels-container"></div>
<div id="credit">🤔 <span>lnwToon005</span></div>

<script>
    let scene, camera, renderer, molecule;
    let isDragging = false, isPanning = false;
    let prevX = 0, prevY = 0, zoom = 10;
    const labelsDiv = document.getElementById('labels-container');

    const V = {
        axialUp: [0,1,0], axialDown: [0,-1,0], eq0: [1,0,0], eq120: [-0.5,0,0.866], eq240: [-0.5,0,-0.866],
        t1:[0,1,0], t2:[0.94,-0.33,0], t3:[-0.47,-0.33,0.816], t4:[-0.47,-0.33,-0.816],
        oR:[1,0,0], oL:[-1,0,0], oF:[0,0,1], oB:[0,0,-1]
    };

    const SHAPES = {
        AX2: { x: [V.eq0, V.oL], e: [] },
        AX3: { x: [V.eq0, V.eq120, V.eq240], e: [] },
        AX4: { x: [V.t1, V.t2, V.t3, V.t4], e: [] },
        AX5: { x: [V.top, V.bottom, V.eq0, V.eq120, V.eq240], e: [] },
        AX6: { x: [V.top, V.bottom, V.oR, V.oL, V.oF, V.oB], e: [] },
        AX2E: { x: [V.eq120, V.eq240], e: [V.eq0] },
        AX3E: { x: [V.t2, V.t3, V.t4], e: [V.t1] },
        AX2E2: { x: [V.t3, V.t4], e: [V.t1, V.t2] },
        AX4E: { x: [V.top, V.bottom, V.eq120, V.eq240], e: [V.eq0] },
        AX3E2: { x: [V.top, V.bottom, V.eq0], e: [V.eq120, V.eq240] },
        AX5E: { x: [V.bottom, V.oR, V.oL, V.oF, V.oB], e: [V.top] },
        AX4E2: { x: [V.oR, V.oL, V.oF, V.oB], e: [V.top, V.bottom] }
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        
        const aspect = window.innerWidth / window.innerHeight;
        camera = new THREE.PerspectiveCamera(45, aspect, 0.1, 1000);
        
        zoom = (window.innerWidth < 600) ? 14 : 10;
        camera.position.z = zoom;

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const light = new THREE.DirectionalLight(0xffffff, 0.6);
        light.position.set(5, 10, 7);
        scene.add(light);

        molecule = new THREE.Group();
        scene.add(molecule);

        // --- Event Listeners สำหรับเมาส์ (Rotate & Pan) ---
        window.addEventListener('mousedown', (e) => {
            if (e.button === 0) isDragging = true; // คลิกซ้าย หมุน
            if (e.button === 2 || e.button === 1) isPanning = true; // คลิกขวา หรือ กลาง ย้ายตำแหน่ง
            prevX = e.clientX; prevY = e.clientY;
        });
        window.addEventListener('mouseup', () => { isDragging = false; isPanning = false; });
        window.addEventListener('contextmenu', (e) => e.preventDefault()); // ปิดเมนูคลิกขวา
        window.addEventListener('mousemove', handleMove);
        
        // --- Event Listeners สำหรับ Touch ---
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) isDragging = true;
            if (e.touches.length === 2) isPanning = true;
            prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
        }, {passive: false});
        window.addEventListener('touchend', () => { isDragging = false; isPanning = false; });
        window.addEventListener('touchmove', handleTouch, {passive: false});

        window.addEventListener('wheel', (e) => {
            zoom = Math.max(3, Math.min(25, zoom + e.deltaY * 0.01));
            camera.position.z = zoom;
        });

        window.addEventListener('resize', onWindowResize);

        initUI();
        animate();
    }

    function handleMove(e) {
        if (isDragging) {
            molecule.rotation.y += (e.clientX - prevX) * 0.01;
            molecule.rotation.x += (e.clientY - prevY) * 0.01;
        } else if (isPanning) {
            // คำนวณระยะการย้ายตำแหน่ง (Pan)
            molecule.position.x += (e.clientX - prevX) * 0.01 * (zoom/10);
            molecule.position.y -= (e.clientY - prevY) * 0.01 * (zoom/10);
        }
        prevX = e.clientX; prevY = e.clientY;
    }

    function handleTouch(e) {
        if (isDragging && e.touches.length === 1) {
            const dX = e.touches[0].clientX - prevX; const dY = e.touches[0].clientY - prevY;
            molecule.rotation.y += dX * 0.01; molecule.rotation.x += dY * 0.01;
            prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
        } else if (isPanning && e.touches.length === 2) {
            const dX = e.touches[0].clientX - prevX; const dY = e.touches[0].clientY - prevY;
            molecule.position.x += dX * 0.01 * (zoom/10);
            molecule.position.y -= dY * 0.01 * (zoom/10);
            prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
        }
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function toggleUI() { document.getElementById('ui').classList.toggle('hidden'); }
    function resetRotation() { molecule.rotation.set(0, 0, 0); }
    function resetPosition() { molecule.position.set(0, 0, 0); }
    function resetEN() { document.getElementById('enC').value = 2.5; document.querySelectorAll('.en-outer').forEach(i => i.value = 3.0); update(); }

    function initUI() {
        const shape = document.getElementById('shape').value;
        const container = document.getElementById('outer_controls');
        container.innerHTML = '';
        SHAPES[shape].x.forEach((_, i) => {
            const div = document.createElement('div'); div.className = 'group';
            div.innerHTML = `<label>อะตอมล้อมรอบ ${i+1} EN <span id="enO${i}_val" class="val-display">3.0</span></label>
                             <input type="range" class="en-outer" id="enO${i}" min="0.7" max="4.0" step="0.1" value="3.0" oninput="update()">`;
            container.appendChild(div);
        });
        update();
    }

    function update() {
        molecule.clear(); labelsDiv.innerHTML = '';
        const shapeKey = document.getElementById('shape').value;
        const enC = parseFloat(document.getElementById('enC').value);
        const bondL = parseFloat(document.getElementById('bondL').value);
        document.getElementById('enC_val').innerText = enC.toFixed(1);
        document.getElementById('bondL_val').innerText = bondL.toFixed(1);

        const data = SHAPES[shapeKey];
        const centerRad = (5.0 - enC) * 0.3;
        molecule.add(new THREE.Mesh(new THREE.SphereGeometry(centerRad, 32, 32), new THREE.MeshStandardMaterial({ color: 0x292F36 })));
        addLabel("อะตอมกลาง ("+enC.toFixed(1)+")", new THREE.Vector3(0,0,0), centerRad);

        let netV = new THREE.Vector3(0, 0, 0);
        const firstEN = document.getElementById('enO0') ? parseFloat(document.getElementById('enO0').value) : 3.0;

        data.x.forEach((posArr, i) => {
            const enO = parseFloat(document.getElementById('enO'+i).value);
            document.getElementById('enO'+i+'_val').innerText = enO.toFixed(1);
            const pos = new THREE.Vector3(...posArr).multiplyScalar(bondL);
            const oRad = (5.0 - enO) * 0.3;
            const color = (enO !== firstEN) ? 0xA41F13 : 0x8F7A6E;

            const atomMesh = new THREE.Mesh(new THREE.SphereGeometry(oRad, 32, 32), new THREE.MeshStandardMaterial({ color: color }));
            atomMesh.position.copy(pos);
            molecule.add(atomMesh);
            addLabel((i+1)+" ("+enO.toFixed(1)+")", pos, oRad);

            const bond = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, pos.length(), 12), new THREE.MeshStandardMaterial({ color: 0x292F36 }));
            bond.position.copy(pos.clone().multiplyScalar(0.5));
            bond.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), pos.clone().normalize());
            molecule.add(bond);

            const diff = enO - enC;
            if (Math.abs(diff) > 0.01) {
                const vDir = diff > 0 ? pos.clone().normalize() : pos.clone().normalize().negate();
                molecule.add(createArrow(vDir, (diff > 0 ? new THREE.Vector3(0,0,0) : pos), Math.abs(diff) * 2.5, 0x6c5ce7, 0.06));
                netV.add(vDir.clone().multiplyScalar(Math.abs(diff)));
            }
        });

        data.e.forEach(posArr => {
            const ePos = new THREE.Vector3(...posArr).multiplyScalar(bondL * 0.5);
            const lobe = new THREE.Mesh(new THREE.SphereGeometry(0.65, 16, 16), new THREE.MeshStandardMaterial({ color: 0x004d40, transparent: true, opacity: 0.4, wireframe: true }));
            lobe.position.copy(ePos);
            molecule.add(lobe);
        });

        const st = document.getElementById('status');
        if (netV.length() > 0.1) {
            molecule.add(createArrow(netV.clone().normalize(), new THREE.Vector3(0,0,0), netV.length()*1.2 + 1.5, 0xff9100, 0.12));
            st.innerText = "สภาพขั้ว: มีขั้ว"; st.style.background = "rgba(255, 243, 224, 0.8)"; st.style.color="#e65100";
        } else {
            st.innerText = "สภาพขั้ว: ไม่มีขั้ว"; st.style.background = "rgba(232, 245, 233, 0.8)"; st.style.color="#2e7d32";
        }
    }

    function createArrow(dir, origin, length, color, thick) {
        const g = new THREE.Group(); const hL = 0.6, sL = Math.max(0.1, length - hL);
        const shaft = new THREE.Mesh(new THREE.CylinderGeometry(thick, thick, sL, 12), new THREE.MeshStandardMaterial({ color: color, depthTest: false }));
        shaft.position.y = sL/2; shaft.renderOrder = 100; g.add(shaft);
        const head = new THREE.Mesh(new THREE.ConeGeometry(thick*3, hL, 12), new THREE.MeshStandardMaterial({ color: color, depthTest: false }));
        head.position.y = sL+hL/2; head.renderOrder = 101; g.add(head);
        g.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.clone().normalize());
        g.position.copy(origin); return g;
    }

    function addLabel(txt, pos, rad) {
        const d = document.createElement('div'); d.className = 'atom-label'; d.innerText = txt;
        d.dataset.x = pos.x; d.dataset.y = pos.y; d.dataset.z = pos.z; d.dataset.rad = rad || 0;
        labelsDiv.appendChild(d);
    }

    function animate() {
        requestAnimationFrame(animate); molecule.updateMatrixWorld();
        document.querySelectorAll('.atom-label').forEach(el => {
            const lp = new THREE.Vector3(parseFloat(el.dataset.x), parseFloat(el.dataset.y), parseFloat(el.dataset.z));
            const wp = lp.applyMatrix4(molecule.matrixWorld); wp.project(camera);
            el.style.left = (wp.x * .5 + .5) * window.innerWidth + 'px';
            el.style.top = (wp.y * -.5 + .5) * window.innerHeight - (parseFloat(el.dataset.rad)*50+20) + 'px';
            el.style.display = wp.z > 1 ? 'none' : 'block';
        });
        renderer.render(scene, camera);
    }
    window.onload = init;
</script>
</body>
</html>
